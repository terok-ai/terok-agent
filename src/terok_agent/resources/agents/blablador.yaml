kind: opencode
label: Blablador
binary: blablador

git_identity:
  name: Blablador
  email: noreply@hzdr.de

headless:
  subcommand: run
  prompt_flag: ""

auto_approve:
  env:
    OPENCODE_PERMISSION: '{"*":"allow"}'

session:
  supports_resume: true
  resume_flag: "--session"
  continue_flag: "--continue"
  session_file: blablador-session.txt

capabilities:
  log_format: plain

opencode:
  display_name: Helmholtz Blablador
  base_url: https://api.helmholtz-blablador.fz-juelich.de/v1
  preferred_model: alias-huge
  fallback_model: alias-code
  env_var_prefix: BLABLADOR
  config_dir: .blablador
  auth_key_url: https://codebase.helmholtz.cloud/-/user_settings/personal_access_tokens

# OpenCode runtime state (shared with all OpenCode-based agents)
mounts:
  - host_dir: _opencode-config
    container_path: /home/dev/.config/opencode
    label: OpenCode config
  - host_dir: _opencode-data
    container_path: /home/dev/.local/share/opencode
    label: OpenCode data
  - host_dir: _opencode-state
    container_path: /home/dev/.local/state
    label: OpenCode state
